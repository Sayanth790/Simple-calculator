<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="calculator">
    <input type="text" id="calc" readonly placeholder="0">
    <div class="buttons">
      <div class="b1">
        <button>7</button>
        <button>8</button>
        <button>9</button>
        <button class="operator">/</button>
      </div>
      <div class="b2">
        <button>4</button>
        <button>5</button>
        <button>6</button>
        <button class="operator">*</button>
      </div>
      <div class="b3">
        <button>1</button>
        <button>2</button>
        <button>3</button>
        <button class="operator">-</button>
      </div>
      <div class="b4">
        <button class="clear">C</button>
        <button>0</button>
        <button class="operator">+</button>
        <button class="equal">=</button>
      </div>
    </div>
  </div>

  
  <script src="first.js"></script>
</body>
</html>
